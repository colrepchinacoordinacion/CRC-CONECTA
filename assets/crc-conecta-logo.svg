<svg xmlns="http://www.w3.org/2000/svg" width="720" height="210" viewBox="0 0 720 210" role="img" aria-labelledby="title desc">
  <title id="title">CRC Conecta</title>
  <desc id="desc">Marca de CRC Conecta con el escudo del Colegio Republica de China y el nombre de la plataforma.</desc>
  <defs>
    <linearGradient id="brandBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2F5F"/>
      <stop offset="1" stop-color="#1B66C9"/>
    </linearGradient>
    <linearGradient id="brandRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#CE1F2C"/>
      <stop offset="1" stop-color="#F05A67"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B2F5F" flood-opacity="0.16"/>
    </filter>
    <clipPath id="crestClip">
      <circle cx="105" cy="105" r="78"/>
    </clipPath>
  </defs>

  <rect width="720" height="210" rx="28" fill="#F7FBFF"/>
  <path d="M28 166 C144 118 214 196 340 150 C482 98 556 130 692 74" fill="none" stroke="#DCEBFA" stroke-width="18" stroke-linecap="round"/>
  <path d="M34 172 C152 132 224 190 338 154 C472 112 570 130 694 86" fill="none" stroke="#CE1F2C" stroke-width="3" stroke-linecap="round" opacity=".55"/>

  <g filter="url(#softShadow)">
    <circle cx="105" cy="105" r="88" fill="#FFFFFF"/>
    <circle cx="105" cy="105" r="86" fill="none" stroke="#D8E7F6" stroke-width="2"/>
    <image href="escudo-colegio.jpg" x="27" y="27" width="156" height="156" preserveAspectRatio="xMidYMid slice" clip-path="url(#crestClip)"/>
  </g>

  <g transform="translate(225 58)">
    <text x="0" y="58"
      font-family="'Segoe Script','Brush Script MT','Lucida Handwriting',cursive"
      font-size="62"
      font-weight="700"
      fill="url(#brandBlue)">CRC Conecta</text>
    <path d="M10 82 C104 100 236 101 354 82" fill="none" stroke="url(#brandRed)" stroke-width="5" stroke-linecap="round"/>
    <text x="4" y="128"
      font-family="'Segoe UI',Arial,sans-serif"
      font-size="18"
      font-weight="700"
      letter-spacing="1.6"
      fill="#527093">Colegio Republica de China I.E.D.</text>
  </g>
</svg>
